services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: taskNova
    volumes:
      - .:/var/www
    depends_on:
      - db

  nginx:
    image: nginx:latest
    container_name: taskNova_nginx
    ports:
      - "8080:80"
    volumes:
      - .:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app

  db:
    image: mysql:8
    container_name: taskNova_db
    restart: always
    environment:
      MYSQL_DATABASE: tasknova
      MYSQL_ROOT_PASSWORD: root 
    ports:
      - "3307:3306"

  queue:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: taskNova_queue
    command: php artisan queue:work
    volumes:
      - .:/var/www
    depends_on:
      - app

  scheduler:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: taskNova_scheduler
    command: >
      sh -c "while true; do php artisan schedule:run; sleep 60; done"
    volumes:
      - .:/var/www
    depends_on:
      - app

  node:
    image: node:20
    container_name: laravel_node
    working_dir: /var/www
    volumes:
      - .:/var/www
    ports:
      - "5173:5173"
    command: sh -c "npm install && npm run dev"